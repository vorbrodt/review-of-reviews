name = "review-analyzer-worker"
main = "review-analyzer-worker.js"
compatibility_date = "2024-11-01"

# "id" below is a placeholder. For local dev (`npm run dev` / `wrangler dev`
# without --remote), wrangler simulates KV locally and this value doesn't need
# to point at a real namespace yet. When you deploy for real later, run:
#   npx wrangler kv namespace create REVIEW_CACHE
# and paste the id it prints in here first.
[[kv_namespaces]]
binding = "REVIEW_CACHE"
id = "local-dev-placeholder"
